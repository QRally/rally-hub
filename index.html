<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rallye Historique | Virtual Notice Board</title>
    <style>
        :root {
            --rally-yellow: #f1c40f;
            --dark-bg: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-light: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-light);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            text-align: center;
            width: 100%;
            padding: 20px 0;
            border-bottom: 2px solid var(--rally-yellow);
            margin-bottom: 20px;
        }
        #rally-clock {
            font-size: 3.5rem;
            font-weight: bold;
            color: var(--rally-yellow);
            font-family: 'Courier New', Courier, monospace;
            margin-top: 10px;
        }
        .container { width: 100%; max-width: 500px; }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 6px solid var(--rally-yellow);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        h2 { margin-top: 0; font-size: 1.2rem; text-transform: uppercase; color: var(--rally-yellow); letter-spacing: 2px; }
        
        .bulletin-item {
            background: #3d3d3d;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-bottom: 1px solid #444;
        }
        .time-stamp { color: var(--rally-yellow); font-weight: bold; font-size: 0.9rem; }
        .bulletin-content { margin-top: 5px; line-height: 1.4; }
        
        /* Link styling for Scrutineering/Noise links in JSON */
        a { color: var(--rally-yellow); text-decoration: underline; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 0.9rem; letter-spacing: 3px; opacity: 0.8;">OFFICIAL EVENT TIME</div>
    <div id="rally-clock">00:00:00</div>
</header>

<div class="container">
    <section class="card">
        <h2>Official Notice Board</h2>
        <div id="bulletin-feed">
            <div class="bulletin-item" style="text-align:center;">Synchronizing with HQ...</div>
        </div>
    </section>
</div>

<script>
    // --- MASTER CLOCK ---
    function updateClock() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('rally-clock').textContent = `${h}:${m}:${s}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // --- JSON FETCHER ---
    const BULLETIN_URL = 'live-bulletins.json'; 

    async function fetchBulletins() {
        try {
            const response = await fetch(BULLETIN_URL + '?t=' + Date.now());
            if (!response.ok) throw new Error();
            const data = await response.json();
            
            const feed = document.getElementById('bulletin-feed');
            
            if (data.bulletins.length === 0) {
                feed.innerHTML = '<div class="bulletin-item">No active updates. Check back soon.</div>';
                return;
            }

            feed.innerHTML = '';
            data.bulletins.forEach(item => {
                const div = document.createElement('div');
                div.className = 'bulletin-item';
                div.innerHTML = `
                    <div class="time-stamp">${item.time}</div>
                    <div class="bulletin-content">
                        <strong>${item.title}</strong><br>
                        ${item.content}
                    </div>
                `;
                feed.appendChild(div);
            });
        } catch (e) {
            console.log("Offline or syncing...");
        }
    }
    
    // Auto-refresh every 30 seconds
    setInterval(fetchBulletins, 30000);
    fetchBulletins();
</script>

</body>
</html>
